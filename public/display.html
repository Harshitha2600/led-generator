<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Live LED Display</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #000000; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }
    #text-container {
      width: 94vw; height: 94vh;
      display: flex; justify-content: center; align-items: center;
    }
    #text-display {
      font-weight: 800; text-align: center; white-space: pre-wrap; word-wrap: break-word;
      line-height: 1.15; padding-top: 0.15em; padding-bottom: 0.15em;
      transform: translateZ(0);
    }
  </style>
</head>
<body>

  <div id="text-container">
    <div id="text-display"></div>
  </div>

  <script>
    const containerEl = document.getElementById('text-container');
    const displayEl = document.getElementById('text-display');
    
    let currentText = "";
    let typingTimeout = null;

    // JavaScript Auto-Fit
    function applyPerfectFontSize(text) {
      if (!text) return;
      displayEl.textContent = text;
      const targetW = containerEl.clientWidth;
      const targetH = containerEl.clientHeight;
      let minFont = 10;
      let maxFont = Math.max(targetW, targetH);
      let bestFit = minFont;

      for (let i = 0; i < 20; i++) {
        let testSize = (minFont + maxFont) / 2;
        displayEl.style.fontSize = testSize + 'px';
        if (displayEl.scrollWidth <= targetW && displayEl.scrollHeight <= targetH) {
          bestFit = testSize; minFont = testSize;
        } else {
          maxFont = testSize;
        }
      }

      displayEl.style.fontSize = (Math.floor(bestFit) - 1) + 'px';
      void displayEl.offsetHeight; 
      displayEl.textContent = ""; 
    }

    // Typing Engine with Stabilization Delay
    function typeText(text, index, lastTime) {
      if (index === 0) displayEl.textContent = "";

      if (index < text.length) {
        const now = performance.now();
        
        // Lag Fallback
        if (index > 0 && (now - lastTime) > 250) {
          displayEl.textContent = text;
          // 6. STABILIZATION DELAY: Wait 600ms for hardware to catch up before recalc
          setTimeout(forceFinalRecalculation, 600);
          return;
        }

        displayEl.textContent += text.charAt(index);
        
        typingTimeout = setTimeout(() => {
          typeText(text, index + 1, performance.now());
        }, 80); 
        
      } else {
        // 6. STABILIZATION DELAY: Animation done, let hardware rest for 600ms
        setTimeout(forceFinalRecalculation, 600);
      }
    }

    // Force Android WebView to dump cached frames
    function forceFinalRecalculation() {
      displayEl.style.transform = "translateZ(1px)";
      setTimeout(() => { displayEl.style.transform = "translateZ(0)"; }, 50);
    }

    // Data Fetching
    async function fetchBoardData() {
      try {
        // 2. API CACHE BUSTING: Forces Render/Netlify edge nodes to fetch fresh data
        const response = await fetch(`/data?t=${Date.now()}`);
        
        if (!response.ok) return;
        const data = await response.json();
        
        let newText = "";
        let color = "#ff6b00"; 
        let fontFamily = "'DM Sans', sans-serif";

        if (data && data.lines && data.lines.length > 0) {
          newText = data.lines.map(l => l.text.trim()).filter(Boolean).join('\n');
          if (data.lines[0].color) color = data.lines[0].color;
          if (data.lines[0].fontFamily) fontFamily = data.lines[0].fontFamily;
        }

        if (newText !== currentText && newText !== "") {
          currentText = newText;
          displayEl.style.color = color;
          displayEl.style.fontFamily = fontFamily;
          
          if (typingTimeout) clearTimeout(typingTimeout);
          
          applyPerfectFontSize(newText);
          typeText(newText, 0, performance.now());
        }
      } catch (error) {
        console.error("Data fetch error. Retrying next cycle...", error);
      }
    }

    fetchBoardData();
    setInterval(fetchBoardData, 3000);
    
    window.addEventListener('resize', () => {
       if (currentText) {
         displayEl.textContent = currentText; 
         applyPerfectFontSize(currentText);   
         displayEl.textContent = currentText; 
       }
    });
  </script>
</body>
</html>
