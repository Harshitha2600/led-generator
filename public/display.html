<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live LED Display</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    /* --- 3. Display Settings & 5. Layout --- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      overflow: hidden; /* Disable scrollbars permanently */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DM Sans', 'Oswald', Arial, sans-serif;
    }

    #text-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 4vw; /* Safe padding so text never touches the absolute edge */
    }

    /* --- 1. Fix lowercase visibility --- */
    #text-display {
      font-weight: 800; /* Extra Bold */
      text-align: center;
      white-space: pre-wrap; /* Respects multi-line text */
      word-wrap: break-word;
      
      /* CRITICAL FIX for letters like 'j', 'g', 'y' */
      line-height: 1.3; 
      padding-bottom: 0.15em; 
      padding-top: 0.15em;
      overflow: visible; 
      
      /* Hardware acceleration hint for smoother rendering on old TVs/LEDs */
      transform: translateZ(0); 
    }
  </style>
</head>
<body>

  <div id="text-container">
    <div id="text-display"></div>
  </div>

  <script>
    const displayEl = document.getElementById('text-display');
    let currentText = "";
    let typeTimeout = null;

    // --- 4. Text Scaling Engine ---
    function adjustScaling(text) {
      const charCount = Math.max(text.length, 1);
      
      // Estimate optimal VW (Viewport Width) based on character count.
      // Short words get big text. Long sentences shrink automatically.
      let optimalVw = 100 / (charCount * 0.55); 
      
      // Clamp the values to prevent extreme sizes
      if (optimalVw > 25) optimalVw = 25; // Maximum width
      if (optimalVw < 4) optimalVw = 4;   // Minimum width
      
      // clamp(min, preferred, max) ensures it never exceeds 30% of the screen height either
      displayEl.style.fontSize = `clamp(16px, ${optimalVw}vw, 30vh)`;
    }

    // --- 2. Safe Typing Animation Engine ---
    function typeText(text, index, lastTime) {
      if (index === 0) {
        displayEl.textContent = "";
      }

      if (index < text.length) {
        const now = performance.now();
        
        // 7. LOW-PERFORMANCE HARDWARE FALLBACK
        // If the LED processor is lagging (took > 250ms to render the last character), 
        // we abort the animation and dump the full text instantly to prevent crashing.
        if (index > 0 && (now - lastTime) > 250) {
          displayEl.textContent = text;
          return;
        }

        displayEl.textContent += text.charAt(index);
        
        // Simple, non-blocking timeout (100ms per character)
        typeTimeout = setTimeout(() => {
          typeText(text, index + 1, performance.now());
        }, 100);
        
      }
    }

    // --- 6. Data Fetching & Cache Busting ---
    async function fetchBoardData() {
      try {
        // ?t=timestamp forces the browser to bypass cache
        const timestamp = new Date().getTime();
        const response = await fetch(`/data?t=${timestamp}`);
        
        if (!response.ok) return;
        const data = await response.json();
        
        // Default fallbacks
        let newText = "";
        let color = "#ff6b00"; 
        let fontFamily = "'DM Sans', sans-serif";

        if (data && data.lines && data.lines.length > 0) {
          // Combine lines into a single string with line breaks
          newText = data.lines.map(l => l.text.trim()).filter(Boolean).join('\n');
          if (data.lines[0].color) color = data.lines[0].color;
          if (data.lines[0].fontFamily) fontFamily = data.lines[0].fontFamily;
        }

        // Only trigger an update if the text actually changed
        if (newText !== currentText && newText !== "") {
          currentText = newText;
          
          displayEl.style.color = color;
          displayEl.style.fontFamily = fontFamily;
          
          // Size the text BEFORE typing starts so the container doesn't jump around
          adjustScaling(newText);
          
          // Clear any currently running animation
          if (typeTimeout) clearTimeout(typeTimeout);
          
          // Start fresh typing effect
          typeText(newText, 0, performance.now());
        }

      } catch (error) {
        console.error("Data fetch error. Retrying next cycle...", error);
        // If internet drops, the current text simply stays safely on screen.
      }
    }

    // Start immediately
    fetchBoardData();

    // Check for new updates every 3 seconds
    setInterval(fetchBoardData, 3000);
    
    // Auto-recalculate size if the screen is rotated or resized
    window.addEventListener('resize', () => {
       if (currentText) adjustScaling(currentText);
    });

  </script>
</body>
</html>
