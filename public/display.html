<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Live Display</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      /* Full black background */
      background-color: #000000 !important; 
      color: #ffffff;
      font-family: 'DM Sans', 'Segoe UI', Roboto, Arial, sans-serif;
      overflow: hidden; 
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
    }

    /* The actual LED board fills the whole viewport */
    .board {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 0.72 to 0.75 tightens the invisible gap above/below standard uppercase fonts */
      line-height: 0.75; 
      font-weight: 800;
      transform-origin: center center;
      /* Base font size to measure and scale from */
      font-size: 100px; 
    }

    .line {
      white-space: nowrap; 
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="board" id="board">
      <div class="content" id="content">Loading text...</div>
    </div>
  </div>

  <script>
    const DEFAULT_BOARD = {
      lines: [{ text: 'WELCOME', color: '#ffffff' }]
    };

    const contentEl = document.getElementById('content');
    const boardEl = document.getElementById('board');

    function getBoardId() {
      const parts = location.pathname.split('/').filter(Boolean);
      return parts[1] || 'default';
    }

    function dataEndpoint() {
      const id = getBoardId();
      return id === 'default' ? '/data' : '/data/' + encodeURIComponent(id);
    }

    function normalizeLine(line) {
      const text = String(line?.text || '').trim();
      let color = '#ffffff';
      if (line?.color && /^#[0-9a-fA-F]{6}$/.test(String(line.color))) {
        color = String(line.color).toLowerCase();
      }
      return { text: text || '', color: color };
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderBoard(payload) {
      const lines = Array.isArray(payload?.lines) && payload.lines.length 
        ? payload.lines.map(normalizeLine).filter((item) => item.text)
        : DEFAULT_BOARD.lines;

      contentEl.innerHTML = lines
        .map((line) => `<div class="line" style="color:${line.color};">${escapeHtml(line.text)}</div>`)
        .join('');
      
      adjustLayout();
    }

    function adjustLayout() {
      const lines = document.querySelectorAll('.line');
      if (!lines.length) return;

      // 1. Reset transforms to get natural measurements
      contentEl.style.transform = 'none';

      // 2. Get exact screen dimensions
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      // 3. Get the natural width and height of the tight text block
      const rect = contentEl.getBoundingClientRect();
      const textW = rect.width || 1;
      const textH = rect.height || 1;

      // 4. Calculate exact multipliers to stretch it to the edges
      const scaleX = screenW / textW;
      const scaleY = screenH / textH;

      // 5. Apply the stretch
      contentEl.style.transform = `scale(${scaleX}, ${scaleY})`;
    }

    async function fetchBoard() {
      try {
        const response = await fetch(dataEndpoint(), { cache: 'no-store' });
        if (!response.ok) throw new Error('Fetch failed');
        const payload = await response.json();
        renderBoard(payload);
      } catch (_error) {
        if (contentEl.textContent === 'Loading text...') {
           contentEl.innerHTML = '<div class="line" style="color:red;">OFFLINE</div>';
           adjustLayout();
        }
      }
    }

    window.addEventListener('resize', adjustLayout);
    setInterval(fetchBoard, 2000);
    fetchBoard();
  </script>
</body>
</html>
